name: Dev Pipeline
on:
    push:
        branches: [dev]

jobs:
    ci:
        name: CI - Test and Lint
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - name: Write ENV_FILE to .env
              run: |
                  if [ -n "${{ vars.ENV_FILE }}" ]; then
                    printf "%s\n" "${{ vars.ENV_FILE }}" > .env
                  else
                    echo "# no ENV_FILE provided" > .env
                  fi
            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "18"
                  cache: "npm"
            - name: Install dependencies
              run: npm ci
            - name: Run linter
              run: npm run lint
            - name: Run prettier
              run: npm run prettier
            - name: Build application
              run: npm run build
            - name: Cache build artifacts
              if: github.ref == 'refs/heads/dev' && github.event_name == 'push'
              uses: actions/cache@v3
              with:
                  path: dist
                  key: build-${{ github.sha }}

    build-and-push:
        name: Build and Push Docker Image
        needs: ci
        runs-on: ubuntu-latest
        environment: dev
        if: github.ref == 'refs/heads/dev' && github.event_name == 'push'
        outputs:
            image-tag: ${{ github.sha }}
        steps:
            - uses: actions/checkout@v4
            - name: Write ENV_FILE to .env
              run: |
                  if [ -n "${{ vars.ENV_FILE }}" ]; then
                    printf "%s\n" "${{ vars.ENV_FILE }}" > .env
                  else
                    echo "# no ENV_FILE provided" > .env
                  fi
            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "18"
                  cache: "npm"
            - name: Install dependencies
              run: npm ci
            - name: Restore build cache
              uses: actions/cache@v3
              with:
                  path: dist
                  key: build-${{ github.sha }}
                  restore-keys: |
                      build-${{ github.ref_name }}-
                      build-
            - name: Build application (if cache miss)
              run: npm run build
            - name: Build Docker image
              run: docker build -t phanmhung/backend-app:${{ github.sha }} .
            - name: Log in to Docker Hub
              env:
                  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
                  DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
              run: |
                  echo "Logging in to Docker Hub as: $DOCKER_USERNAME"
                  echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin
            - name: Push Docker image
              run: |
                  echo "Pushing image: phanmhung/backend-app:${{ github.sha }}"
                  docker push phanmhung/backend-app:${{ github.sha }}
                  echo "✅ Image pushed successfully"
            - name: Log out from Docker Hub
              run: docker logout

    deploy:
        name: Deploy to VPS
        needs: build-and-push
        runs-on: ubuntu-latest
        environment: dev
        if: github.ref == 'refs/heads/dev' && github.event_name == 'push'
        steps:
            - name: Deploy to VPS
              env:
                  SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
                  VPS_HOST: ${{ secrets.VPS_HOST }}
                  VPS_USER: ${{ secrets.VPS_USER }}
                  DATABASE_URL: ${{ secrets.DATABASE_URL }}
                  REDIS_URL: ${{ secrets.REDIS_URL }}
                  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
                  DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
                  IMAGE_TAG: ${{ github.sha }}
              run: |
                  echo "🚀 Starting deployment to VPS..."
                  echo "📦 Image: phanmhung/backend-app:$IMAGE_TAG"
                  echo "🖥️  Target: $VPS_USER@$VPS_HOST"

                  # Setup SSH key
                  echo "$SSH_PRIVATE_KEY" > ~/ssh_key
                  chmod 600 ~/ssh_key

                  # Deploy to VPS
                  ssh -i ~/ssh_key -o StrictHostKeyChecking=no $VPS_USER@$VPS_HOST << EOF
                    set -e
                    echo "🔗 Connected to VPS successfully"

                    # Login to Docker Hub
                    echo "🔐 Logging in to Docker Hub..."
                    echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin

                    # Pull new image
                    echo "📥 Pulling new image: phanmhung/backend-app:$IMAGE_TAG"
                    docker pull phanmhung/backend-app:$IMAGE_TAG

                    # Stop and remove old container
                    echo "🛑 Stopping existing container..."
                    docker stop backend || echo "No existing container to stop"
                    docker rm backend || echo "No existing container to remove"

                    # Run new container
                    echo "🚀 Starting new container..."
                    docker run -d --name backend \
                      --network server \
                      -p 4000:3000 \
                      --env DATABASE_URL="${{ secrets.DATABASE_URL }}" \
                      --env REDIS_URL="${{ secrets.REDIS_URL }}" \
                      --env NODE_ENV=development \
                      --env APP_PORT=3000 \
                      --env TYPE="${{ vars.TYPE }}" \
                      --env PROJECT_ID="${{ vars.PROJECT_ID }}" \
                      --env PRIVATE_KEY_ID="${{ vars.PRIVATE_KEY_ID }}" \
                      --env PRIVATE_KEY="${{ secrets.PRIVATE_KEY }}" \
                      --env CLIENT_EMAIL="${{ vars.CLIENT_EMAIL }}" \
                      --env CLIENT_ID="${{ vars.CLIENT_ID }}" \
                      --env AUTH_URI="${{ vars.AUTH_URI }}" \
                      --env TOKEN_URI="${{ vars.TOKEN_URI }}" \
                      --env AUTH_CERT_URL="${{ vars.AUTH_CERT_URL }}" \
                      --env CLIENT_CERT_URL="${{ vars.CLIENT_CERT_URL }}" \
                      --env UNIVERSAL_DOMAIN="${{ vars.UNIVERSAL_DOMAIN }}" \
                      --env FIREBASE_WEB_API_KEY="${{ secrets.FIREBASE_WEB_API_KEY }}" \
                      --env RECAPTCHA_SECRET_KEY="${{ secrets.RECAPTCHA_SECRET_KEY }}" \
                      --env RECAPTCHA_SCORE_THRESHOLD="${{ vars.RECAPTCHA_SCORE_THRESHOLD }}" \
                      --env OTP_BYPASS_PHONES="${{ vars.OTP_BYPASS_PHONES }}" \
                      --env GOOGLE_CLIENT_ID="${{ vars.GOOGLE_CLIENT_ID }}" \
                      --env GOOGLE_CLIENT_SECRET="${{ secrets.GOOGLE_CLIENT_SECRET }}" \
                      --env GOOGLE_REDIRECT_URI="${{ vars.GOOGLE_REDIRECT_URI }}" \
                      --env SMTP_HOST="${{ vars.SMTP_HOST }}" \
                      --env SMTP_PORT="${{ vars.SMTP_PORT }}" \
                      --env SMTP_FROM="${{ vars.SMTP_FROM }}" \
                      --env SMTP_USER="${{ vars.SMTP_USER }}" \
                      --env SMTP_PASS="${{ secrets.SMTP_PASS }}" \
                      --restart always \
                      phanmhung/backend-app:$IMAGE_TAG

                    # Wait for container to start
                    echo "⏳ Waiting for container to start..."
                    sleep 15

                    # Check if container is running
                    if docker ps | grep -q "backend"; then
                      echo "✅ Container is running"

                      # Run migrations
                      echo "🔄 Running database migrations..."
                      docker exec backend npm run migrate:up || echo "⚠️  Migration failed or no migrations to run"

                      # Show container status
                      echo "📊 Container status:"
                      docker ps --filter name=backend --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"

                      # Show container logs (last 10 lines)
                      echo "📋 Recent container logs:"
                      docker logs backend --tail 10
                    else
                      echo "❌ Container failed to start"
                      docker logs backend --tail 20
                      exit 1
                    fi

                    # Cleanup old images (keep last 3)
                    echo "🧹 Cleaning up old images..."
                    docker images phanmhung/backend-app --format "{{.Tag}}" | head -n -3 | xargs -r docker rmi phanmhung/backend-app: || true
                    docker image prune -f || true

                    # Logout from Docker Hub
                    docker logout

                    echo "🎉 Deployment completed successfully!"
                  EOF

                  # Cleanup SSH key
                  rm ~/ssh_key

                  echo "✅ Deployment process finished"
