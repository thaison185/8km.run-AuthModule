name: Branch CI

on:
    push:
        branches-ignore:
            - main
            - dev
    pull_request:
        branches:
            - main
            - dev

jobs:
    lint:
        name: Lint
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "18"
                  cache: "npm"
            - name: Install dependencies
              run: npm ci
            - name: ESLint
              run: npm run lint
            - name: Prettier (check)
              run: npm run prettier
