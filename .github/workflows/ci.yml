name: CI Pipeline
on:
    push:
        branches: [dev, main]
    pull_request:
        branches: [dev, main]
jobs:
    test-and-lint:
        runs-on: ubuntu-latest
        outputs:
            success: ${{ steps.final.outputs.success }}
        steps:
            - uses: actions/checkout@v3
            - name: Set up Node.js
              uses: actions/setup-node@v3
              with:
                  node-version: "18"
                  cache: "npm"
            - name: Install dependencies
              run: npm ci
            - name: Run linter
              run: npm run lint
            - name: Run prettier
              run: npm run prettier
            - name: Build application
              run: npm run build
            - name: Mark as successful
              id: final
              run: echo "success=true" >> $GITHUB_OUTPUT
