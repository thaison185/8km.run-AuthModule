name: Backend CI/CD
on:
    push:
        branches: [dev]
jobs:
    build-and-push:
        runs-on: ubuntu-latest
        environment: dev
        steps:
            - uses: actions/checkout@v3
            - name: Set up Node.js
              uses: actions/setup-node@v3
              with:
                  node-version: "18"
                  cache: "npm"
            - name: Install dependencies
              run: npm ci
            - name: Run linter
              run: npm run lint
            - name: Run prettier
              run: npm run prettier
            - name: Build application
              run: npm run build
            - name: Build Docker image
              run: docker build -t phanmhung/backend-app:$GITHUB_SHA .
            - name: Push to Docker Hub
              env:
                  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
                  DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
              run: |
                  echo "Username: $DOCKER_USERNAME"
                  echo "Pushing to: phanmhung/backend-app:$GITHUB_SHA"
                  echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin
                  docker push phanmhung/backend-app:$GITHUB_SHA
    deploy:
        needs: build-and-push
        runs-on: ubuntu-latest
        environment: dev
        steps:
            - name: Deploy to VPS
              env:
                  SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
                  VPS_HOST: ${{ secrets.VPS_HOST }}
                  VPS_USER: ${{ secrets.VPS_USER }}
                  DATABASE_URL: ${{ secrets.DATABASE_URL }}
                  REDIS_URL: ${{ secrets.REDIS_URL }}
              run: |
                  echo "$SSH_PRIVATE_KEY" > ~/ssh_key
                  chmod 600 ~/ssh_key
                  ssh -i ~/ssh_key -o StrictHostKeyChecking=no $VPS_USER@$VPS_HOST << 'EOF'
                    docker pull phanmhung/backend-app:$GITHUB_SHA
                    docker stop backend || true
                    docker rm backend || true
                    docker run -d --name backend \
                      -p 3000:3000 \
                      --env DATABASE_URL=$DATABASE_URL \
                      --env REDIS_URL=$REDIS_URL \
                      --env NODE_ENV=development \
                      --restart always \
                      phanmhung/backend-app:$GITHUB_SHA
                    docker exec backend npm run migrate:up
                  EOF
                  rm ~/ssh_key
