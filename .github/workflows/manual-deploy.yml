name: Manual Deploy
on:
    workflow_dispatch:
        inputs:
            image_tag:
                description: "Docker image tag to deploy (commit SHA)"
                required: true
                type: string
            environment:
                description: "Environment to deploy to"
                required: true
                default: "dev"
                type: choice
                options:
                    - dev
                    - staging
                    - prod
            run_migrations:
                description: "Run database migrations"
                required: false
                default: true
                type: boolean

jobs:
    manual-deploy:
        runs-on: ubuntu-latest
        environment: ${{ github.event.inputs.environment }}
        steps:
            - name: Deploy to VPS
              env:
                  SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
                  VPS_HOST: ${{ secrets.VPS_HOST }}
                  VPS_USER: ${{ secrets.VPS_USER }}
                  DATABASE_URL: ${{ secrets.DATABASE_URL }}
                  REDIS_URL: ${{ secrets.REDIS_URL }}
                  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
                  DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
                  IMAGE_TAG: ${{ github.event.inputs.image_tag }}
                  ENVIRONMENT: ${{ github.event.inputs.environment }}
                  RUN_MIGRATIONS: ${{ github.event.inputs.run_migrations }}
              run: |
                  echo "$SSH_PRIVATE_KEY" > ~/ssh_key
                  chmod 600 ~/ssh_key
                  echo "Deploying image tag: $IMAGE_TAG to $ENVIRONMENT"
                  ssh -i ~/ssh_key -o StrictHostKeyChecking=no $VPS_USER@$VPS_HOST << 'EOF'
                    echo "Connected to VPS"
                    echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin
                    docker pull phanmhung/backend-app:$IMAGE_TAG
                    docker stop backend || true
                    docker rm backend || true
                    docker run -d --name backend \
                      -p 3000:3000 \
                      --env DATABASE_URL="$DATABASE_URL" \
                      --env REDIS_URL="$REDIS_URL" \
                      --env NODE_ENV=$ENVIRONMENT \
                      --restart always \
                      phanmhung/backend-app:$IMAGE_TAG
                    sleep 10
                    if [ "$RUN_MIGRATIONS" = "true" ]; then
                      echo "Running migrations..."
                      docker exec backend npm run migrate:up
                    fi
                    docker image prune -f
                  EOF
                  rm ~/ssh_key
