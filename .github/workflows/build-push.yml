name: Build, Push, and Deploy
on:
    workflow_run:
        workflows: ["CI Pipeline"]
        types:
            - completed
        branches: [dev]
jobs:
    build-and-push:
        runs-on: ubuntu-latest
        environment: dev
        if: ${{ github.event.workflow_run.conclusion == 'success' }}
        steps:
            - uses: actions/checkout@v3
            - name: Debug workflow trigger
              run: |
                  echo "Triggered by workflow_run ID: ${{ github.event.workflow_run.id }}"
                  echo "Commit SHA: ${{ github.sha }}"
            - name: Set up Node.js
              uses: actions/setup-node@v3
              with:
                  node-version: "18"
                  cache: "npm"
            - name: Install dependencies
              run: npm ci
            - name: Restore build cache
              uses: actions/cache@v3
              with:
                  path: dist
                  key: build-${{ github.sha }}
                  restore-keys: |
                      build-${{ github.ref_name }}-
                      build-
            - name: Build application
              run: npm run build
            - name: Build Docker image
              run: docker build -t phanmhung/backend-app:${{ github.sha }} .
            - name: Push to Docker Hub
              env:
                  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
                  DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
              run: |
                  echo "Username: $DOCKER_USERNAME"
                  echo "Pushing to: phanmhung/backend-app:${{ github.sha }}"
                  echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin
                  docker push phanmhung/backend-app:${{ github.sha }}
    deploy:
        needs: build-and-push
        runs-on: ubuntu-latest
        environment: dev
        steps:
            - name: Deploy to VPS
              env:
                  SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
                  VPS_HOST: ${{ secrets.VPS_HOST }}
                  VPS_USER: ${{ secrets.VPS_USER }}
                  DATABASE_URL: ${{ secrets.DATABASE_URL }}
                  REDIS_URL: ${{ secrets.REDIS_URL }}
                  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
                  DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
                  IMAGE_TAG: ${{ github.sha }}
              run: |
                  echo "$SSH_PRIVATE_KEY" > ~/ssh_key
                  chmod 600 ~/ssh_key
                  echo "Deploying image tag: $IMAGE_TAG to dev"
                  ssh -i ~/ssh_key -o StrictHostKeyChecking=no $VPS_USER@$VPS_HOST << 'EOF'
                    echo "Connected to VPS"
                    echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin
                    docker pull phanmhung/backend-app:$IMAGE_TAG
                    docker stop backend || true
                    docker rm backend || true
                    docker run -d --name backend \
                      -p 3000:3000 \
                      --env DATABASE_URL="$DATABASE_URL" \
                      --env REDIS_URL="$REDIS_URL" \
                      --env NODE_ENV=development \
                      --restart always \
                      phanmhung/backend-app:$IMAGE_TAG
                    sleep 10
                    echo "Running migrations..."
                    docker exec backend npm run migrate:up
                    docker image prune -f
                    docker logout
                  EOF
                  rm ~/ssh_key
