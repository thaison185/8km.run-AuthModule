version: "3.8"
services:
    backend:
        build:
            context: .
            dockerfile: Dockerfile
        ports:
            - "3000:3000"
        environment:
            - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/postgres
            - REDIS_URL=redis://redis:6379
            - NODE_ENV=development
            - APP_PORT=3000
            - APP_NAME=BACKEND
        depends_on:
            - postgres
            - redis
        restart: always
        volumes:
            - ./src:/app/src # For development hot reload (optional)

    postgres:
        image: postgres:15
        environment:
            - POSTGRES_USER=postgres
            - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
            - POSTGRES_DB=postgres
        ports:
            - "5432:5432"
        volumes:
            - pgdata:/var/lib/postgresql/data
        restart: always

    redis:
        image: redis:7
        ports:
            - "6379:6379"
        restart: always
        command: redis-server --appendonly yes
        volumes:
            - redisdata:/data

volumes:
    pgdata:
        driver: local
    redisdata:
        driver: local
