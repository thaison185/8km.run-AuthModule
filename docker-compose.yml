version: "3.8"
services:
    backend:
        build:
            context: .
            dockerfile: Dockerfile
        ports:
            - "3000:3000"
        environment:
            - DATABASE_URL=${DATABASE_URL}
            - REDIS_URL=${REDIS_URL}
            - NODE_ENV=development
        depends_on:
            - postgres
            - redis
        restart: always
    postgres:
        image: postgres:15
        environment:
            - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
        ports:
            - "5432:5432"
        volumes:
            - pgdata:/var/lib/postgresql/data
    redis:
        image: redis:7
        ports:
            - "6379:6379"
volumes:
    pgdata:
        driver: local
